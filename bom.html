<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Validation</title>
  <link rel="stylesheet" href="bom.css">
</head>
<body>
  <div class="container">
    <h2>Form Validation</h2>
    <form>
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
      <button type="button" onclick="addUser()">Submit</button>
      <div class="error"><!-- Error messages here --></div>
    </form>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>password</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        <!-- Submissions here -->
        <tr>
          <td>Sample Name</td>
          <td>sample@email.com</td>
          <td>password</td>
          <td><button>Edit</button></td>
          <td><button>Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="bom.js"></script>
</body>
