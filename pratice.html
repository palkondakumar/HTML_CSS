<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // ES5 Versions of Functions 


        function sayhello1() { }
        const sayhello2 = function () { }
        const sayhello3 = function welcome() { }

        sayhello1();
        sayhello2();
        sayhello3();


        // ES6 - Arrow Function or Fat Arrow Function 



        const sayhello4 = () => {

            document.writeln("welcome to  Es6 version  in javascript");
        }
        sayhello4();


    </script>
</body>

</html>
